{% extends "base.html" %}

{% block content %}

<div class="grid place-items-center">
    <div class="container bg-base-200 border-base-300 rounded-box size-50 border p-4">

      <div class="flex justify-between">
          <label class="label">Имя пользователя</label>
          <p>{{ user.fio }}</p>
      </div>
      <div class="flex justify-between">
          <label class="label">Департамент</label>
          <p>{{ user.dep_name }}</p>
      </div>
      <div class="flex justify-between">
          <label class="label">Должность</label>
          <p>{{ user.post }}</p>
      </div>

    </div>
</div>

{% endblock %}
