{% extends "base.html" %}

{% block content %}

<div
  x-data="reportsTabs()" x-init="init()">
  <!-- Кнопки открытия вкладок -->
  <div class="flex justify-start gap-4 items-center">
    <button
      class="btn btn-neutral"
      type="button"
      @click="openTab('returns')"
      :disabled="tabs.length >= maxTabs"
    >
      Возвраты СО
    </button>

    <button
      class="btn btn-neutral"
      type="button"
      @click="openTab('wrong')"
      :disabled="tabs.length >= maxTabs"
    >
      Ошибочные заявки
    </button>

    <button
      class="btn btn-error"
      type="button"
      @click="closeAll()"
    >
      Закрыть всё
    </button>

    <div class="text-sm opacity-70">
      Открыто: <span x-text="tabs.length"></span>/<span x-text="maxTabs"></span>
    </div>
  </div>

  <!-- Заголовки вкладок -->
  <div class="tabs tabs-border flex-wrap">
    <template x-for="tab in tabs" :key="tab.id">
      <a
        class="tab"
        role="tab"
        href="#"
        :class="activeId === tab.id ? 'tab-active' : ''"
        @click.prevent="activeId = tab.id"
      >
        <span x-text="tab.title"></span>
        <button
          type="button"
          class="btn btn-ghost btn-xs ml-2"
          title="Закрыть"
          @click.stop="closeTab(tab.id)"
        >
          ✕
        </button>
      </a>
    </template>

    <template x-if="tabs.length === 0">
      <div class="p-4 opacity-70">
        Откройте вкладку кнопками выше.
      </div>
    </template>
  </div>

  <!-- Контент активной вкладки -->
  <template x-for="tab in tabs" :key="tab.id">
    <section
      x-show="activeId === tab.id"
      class="border-base-300 bg-base-100 p-6 rounded-box"
    >
      <!-- ФИЛЬТРЫ: ТОЛЬКО для "Возвраты СО" -->
      <template x-if="tab.kind === 'returns'">
        <div class="flex flex-wrap justify-between items-end gap-4 mb-5">
          <div class="grid grid-rows-2 gap-4 ml-2">
            <label class="select outline-none text-secondary-content">
              <span class="label">Статус</span>
              <select x-model="tab.state.status">
                <option value="all">Все записи</option>
                <option value="1">1 - Документ принят</option>
                <option value="2">2 - Документ одобрен</option>
                <option value="3">3 - Документ передан в 1С</option>
                <option value="5">5 - Отказ в возврате</option>
                <option value="100">100 - Отклонен оператором</option>
              </select>
            </label>

            <label class="select outline-none text-secondary-content">
              <span class="label">Тип возврата</span>
              <select x-model="tab.state.type">
                <option value="any">Любой тип</option>
                <option value="СО">СО</option>
                <option value="ЕП">ЕП</option>
              </select>
            </label>
          </div>

          <label class="input outline-none text-secondary-content">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
              <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              type="search"
              class="grow"
              placeholder="Поиск (референс/БИН)"
              x-model.trim="tab.state.query"
            />
          </label>
        </div>
      </template>

      <div class="overflow-x-auto h-100 bg-base-200 rounded-box shadow">
        <table class="table table-xs table-pin-rows">
          <thead>
            <tr class="text-secondary-content bg-base-200">
              <th>№</th>
              <th>Референс</th>
              <th>БИН отправ.</th>
              <th>№ плат.поруч.</th>
              <th>Дата плат.</th>
              <th>Сумма платежа</th>
              <th>Сумма возврата</th>
              <th>Статус</th>
              <th>КНП</th>
              <th>Тип возврата</th>
              <th>Дата ООП</th>
              <th>Дата ГФСС</th>
              <th>Дата 1С</th>
            </tr>
          </thead>

          <tbody class="text-base-content">
            {% for refund in refunds|default([]) %}
              {% for item in refund.items|default([]) %}
                <tr
                  class="cursor-pointer"
                  @click="loadPerson(tab, '{{ item.iin }}')"
                  :class="tab.state.selectedIin === '{{ item.iin }}' ? 'bg-accent-content' : ''"
                  x-show="
                    (tab.kind === 'returns' && rowVisible(tab, '{{ refund.status }}', '{{ refund.type_payer }}', '{{ refund.refer_in }}', '{{ item.iin }}'))
                    ||
                    (tab.kind === 'wrong' && '{{ refund.status }}' === '2')
                  "
                >
                  <td>{{ item.ret_num }}</td>
                  <td>{{ refund.refer_in }}</td>
                  <td>{{ item.iin }}</td>
                  <td>{{ refund.c1_doc_number }}</td>
                  <td>{{ refund.c1_doc_date.strftime('%d.%m.%Y') if refund.c1_doc_date else '' }}</td>
                  <td>{{ refund.sum_all }}</td>
                  <td>{{ item.line_refund }}</td>
                  <td>{{ refund.status }}</td>
                  <td>{{ refund.knp }}</td>
                  <td>{{ refund.type_payer }}</td>
                  <td>{{ refund.recv_date.strftime('%d.%m.%Y') if refund.recv_date else '' }}</td>
                  <td>{{ item.doc_date.strftime('%d.%m.%Y') if item.doc_date else '' }}</td>
                  <td>{{ refund.swift_date.strftime('%d.%m.%Y') if refund.swift_date else '' }}</td>
                </tr>
              {% endfor %}
            {% endfor %}
          </tbody>
        </table>
      </div>

      <!-- Детали выбранного человека: у каждой вкладки свои -->
      <div
        x-show="tab.state.personPanelOpen"
        class="overflow-x-auto h-60 p-5 mt-6 bg-base-200 rounded-box shadow"
      >
        <template x-if="tab.state.loadingPerson">
          <span class="loading loading-spinner loading-lg"></span>
        </template>

        <template x-if="tab.state.personError">
          <p class="text-error" x-text="tab.state.personError"></p>
        </template>

        <template x-if="tab.state.person">
          <div>
            <h3 class="text-lg text-accent font-bold mb-2">Данные физ.лица</h3>

            <div class="flex gap-1 text-base-content">
              <b>ИИН:</b> <p class="select-all" x-text="tab.state.person.iin"></p>
            </div>

            <div class="flex gap-1 text-base-content">
              <b>ФИО:</b>
              <p
                class="select-all"
                x-text="`${tab.state.person.lastname || ''} ${tab.state.person.firstname || ''} ${tab.state.person.middlename || ''}`.trim()"
              ></p>
            </div>

            <div class="flex gap-1 text-base-content">
              <b>Дата рождения:</b> <p class="select-all" x-text="tab.state.person.birthdate || ''"></p>
            </div>

            <div class="flex gap-1 text-base-content">
              <b>Адрес:</b> <p class="select-all" x-text="tab.state.person.address || ''"></p>
            </div>
          </div>
        </template>
      </div>
    </section>
  </template>
</div>

<script>
  function reportsTabs() {
    return {
      maxTabs: 6,
      tabs: [],
      activeId: null,
      counters: { returns: 0, wrong: 0 },

      async loadPerson(tab, iin) {
        tab.state.selectedIin = iin;
        tab.state.personPanelOpen = true;
        tab.state.loadingPerson = true;
        tab.state.personError = null;
        tab.state.person = null;

        try {
          const resp = await fetch(`/reports/person/${encodeURIComponent(iin)}`);
          if (!resp.ok) throw new Error('HTTP error');

          const data = await resp.json();
          if (!data) {
            tab.state.personError = 'Данные не найдены';
          } else {
            tab.state.person = data;
          }
        } catch (e) {
          tab.state.personError = 'Ошибка загрузки данных';
        } finally {
          tab.state.loadingPerson = false;
        }
      },

      storageKey: 'reportsTabsState:v1',
      _saveTimer: null,

      init() {
        this.restore();

        // автосохранение при изменениях
        this.$watch('tabs', () => this.scheduleSave(), { deep: true });
        this.$watch('activeId', () => this.scheduleSave());
        this.$watch('counters', () => this.scheduleSave(), { deep: true });
      },
      snapshotForSave() {
        return {
          activeId: this.activeId,
          counters: this.counters,
          tabs: this.tabs.map(t => ({
            id: t.id,
            kind: t.kind,
            title: t.title,
            state: {
              status: t.state.status,
              type: t.state.type,
              query: t.state.query,

              selectedIin: t.state.selectedIin,
              personPanelOpen: t.state.personPanelOpen
            }
          }))
        };
      },

      scheduleSave() {
        clearTimeout(this._saveTimer);
        this._saveTimer = setTimeout(() => this.save(), 300);
      },

      save() {
        try {
          localStorage.setItem(this.storageKey, JSON.stringify(this.snapshotForSave()));
        } catch (e) {
          // если storage переполнен или запрещён — просто молчим
        }
      },

      restore() {
        try {
          const raw = localStorage.getItem(this.storageKey);
          if (!raw) return;

          const data = JSON.parse(raw);
          if (!data || !Array.isArray(data.tabs)) return;

          this.counters = data.counters || { returns: 0, wrong: 0 };

          this.tabs = data.tabs.slice(0, this.maxTabs).map(t => ({
            id: t.id || `${t.kind}-${Date.now()}-${Math.random().toString(16).slice(2)}`,
            kind: t.kind,
            title: t.title || (t.kind === 'returns' ? 'Возвраты СО' : 'Ошибочные заявки'),
            state: {
              status: t.state?.status ?? 'all',
              type: t.state?.type ?? 'any',
              query: t.state?.query ?? '',

              selectedIin: t.state?.selectedIin ?? null,
              personPanelOpen: t.state?.personPanelOpen ?? false,

              // эти поля не сохраняем — они живые
              loadingPerson: false,
              personError: null,
              person: null
            }
          }));

          this.activeId =
            data.activeId && this.tabs.some(x => x.id === data.activeId)
              ? data.activeId
              : (this.tabs[0]?.id ?? null);

          // если надо — подтянуть данные выбранных людей после восстановления
          this.tabs.forEach(t => {
            if (t.state.selectedIin) this.loadPerson(t, t.state.selectedIin);
          });
        } catch (e) {
          // битый JSON — игнорируем
        }
      },

      clearSavedState() {
        localStorage.removeItem(this.storageKey);
      },

      openTab(kind) {
        if (this.tabs.length >= this.maxTabs) return;

        this.counters[kind] += 1;

        const titleBase = kind === 'returns' ? 'Возвраты СО' : 'Ошибочные заявки';
        const title = this.counters[kind] > 1 ? `${titleBase} #${this.counters[kind]}` : titleBase;

        const id = `${kind}-${Date.now()}-${Math.random().toString(16).slice(2)}`;

        const newTab = {
          id,
          kind,
          title,
          state: {
            status: 'all',
            type: 'any',
            query: '',

            // состояние выбранного человека — ВНУТРИ вкладки
            selectedIin: null,
            personPanelOpen: false,
            loadingPerson: false,
            personError: null,
            person: null
          }
        };

        this.tabs.push(newTab);
        this.activeId = id;
      },

      closeTab(id) {
        const idx = this.tabs.findIndex(t => t.id === id);
        if (idx === -1) return;

        const wasActive = this.activeId === id;
        this.tabs.splice(idx, 1);

        if (!wasActive) return;

        this.counters[this.tabs[idx - 1]?.kind ?? 'returns'] -= 1;

        const next = this.tabs[idx] || this.tabs[idx - 1] || null;
        this.activeId = next ? next.id : null;
      },

      closeAll() {
        this.tabs.splice(0, this.tabs.length);
        this.counters = { returns: 0, wrong: 0 };
      },

      rowVisible(tab, status, typePayer, referIn, iin) {
        if (tab.state.status !== 'all' && String(status) !== String(tab.state.status)) return false;
        if (tab.state.type !== 'any' && String(typePayer) !== String(tab.state.type)) return false;

        const q = (tab.state.query || '').toLowerCase();
        if (!q) return true;

        const hay = `${referIn ?? ''} ${iin ?? ''}`.toLowerCase();
        return hay.includes(q);
      }
    };
  }
</script>

{% endblock %}
